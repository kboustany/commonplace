{% extends 'core/base.html' %}

{% block content %}

  <p>Tag: {{ tag }}</p>

  <p>Description: {{ tag.description }}</p>

  <ul>
    {% for entry in entries %}
      <li>
        <a href="{% url 'core:entry' entry.id %}">{{ entry }}</a>
      </li>
    {% empty %}
      <p>There are no entries associated to this tag yet.</p>
    {% endfor %}
  </ul>

{% endblock content %}
